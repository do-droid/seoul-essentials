startCommand:
  type: http
  configSchema:
    type: object
    properties:
      apiBaseUrl:
        type: string
        description: "Base URL of the Seoul Essentials REST API (Cloud Functions endpoint)"
    required:
      - apiBaseUrl
  commandFunction: |-
    (config) => ({
      command: "uv",
      args: ["run", "python", "-m", "src.server"],
      env: {
        API_BASE_URL: config.apiBaseUrl,
        PORT: "8081"
      }
    })
build:
  dockerfile: Dockerfile
  dockerBuildPath: "."
