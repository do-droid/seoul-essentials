startCommand:
  type: http
  configSchema:
    type: object
    properties:
      firebaseCredentialsBase64:
        type: string
        description: "Base64-encoded Firebase service account JSON key"
    required:
      - firebaseCredentialsBase64
  commandFunction: |-
    (config) => ({
      command: "uv",
      args: ["run", "python", "-m", "src.server"],
      env: {
        FIREBASE_CREDENTIALS_BASE64: config.firebaseCredentialsBase64,
        PORT: "8081"
      }
    })
build:
  dockerfile: Dockerfile
  dockerBuildPath: "."
